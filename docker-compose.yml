version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file: .env
    volumes:
      - /tmp/venture_court_mvps:/tmp/venture_court_mvps

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
